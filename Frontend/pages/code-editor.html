<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>EvalEra | Code Editor</title>
  <meta name="viewport" content="width=1440, initial-scale=1" />
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: #f4f4f4;
    }

    .container {
      display: flex;
      height: 100vh;
      flex-direction: column;
    }

    header {
      background-color: #4F46E5;
      color: white;
      padding: 15px 30px;
      font-size: 1.5rem;
      font-weight: bold;
    }

    .editor-section {
      display: flex;
      flex: 1;
      padding: 10px;
      gap: 10px;
    }

    .editor {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .editor label {
      font-weight: 600;
      margin-bottom: 4px;
      color: #333;
    }

    textarea {
      flex: 1;
      width: 100%;
      min-height: 120px;
      padding: 10px;
      font-family: monospace;
      font-size: 14px;
      border-radius: 6px;
      border: 1px solid #ccc;
      resize: vertical;
      background: white;
    }

    .preview {
      flex: 1;
      border: none;
      background: white;
      border-radius: 6px;
      box-shadow: inset 0 0 5px rgba(0,0,0,0.1);
    }

    footer {
      background: #e5e5e5;
      padding: 10px 20px;
      text-align: right;
    }

    button {
      padding: 10px 20px;
      background-color: #4F46E5;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background-color: #3730a3;
    }

    .left-column {
      flex: 1.2;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .right-column {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .output-label {
      font-weight: 600;
      margin: 10px 0 5px 0;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>EvalEra – Live Code Editor</header>

    <div class="editor-section">
      <div class="left-column">
        <div class="editor">
          <label for="htmlCode">HTML</label>
          <textarea id="htmlCode" placeholder="Write HTML here...">
<h1>Hello, World!</h1>
<p>This is EvalEra live code editor.</p>
          </textarea>
        </div>
        <div class="editor">
          <label for="cssCode">CSS</label>
          <textarea id="cssCode" placeholder="Write CSS here...">
body {
  background: #f0f8ff;
  text-align: center;
  font-family: Arial;
}
h1 {
  color: #4F46E5;
}
          </textarea>
        </div>
        <div class="editor">
          <label for="jsCode">JavaScript</label>
          <textarea id="jsCode" placeholder="Write JavaScript here...">
console.log("Hello from JS!");
          </textarea>
        </div>
      </div>

      <div class="right-column">
        <span class="output-label">Live Preview</span>
        <iframe id="preview" class="preview"></iframe>
      </div>
    </div>

    <footer>
      <button onclick="run()">Run Code ▶</button>
    </footer>
  </div>

  <script>
    function run() {
      const html = document.getElementById("htmlCode").value;
      const css = "<style>" + document.getElementById("cssCode").value + "</style>";
      const js = "<script>" + document.getElementById("jsCode").value + "<\/script>";

      const output = document.getElementById("preview");
      output.srcdoc = html + css + js;
    }

    // Auto-run once on load
    window.onload = run;
  </script>
  <script src="../script.js"></script>

</body>
</html>
