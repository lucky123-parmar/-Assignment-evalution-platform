<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Edit Profile | EvalEra</title>
  <meta name="viewport" content="width=1440, initial-scale=1" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="../style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      background: #f0f2f5;
      font-family: 'Poppins', sans-serif;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 260px;
      background: #fff;
      color: #333;
      display: flex;
      flex-direction: column;
      padding: 20px;
      box-shadow: 2px 0 5px rgba(0,0,0,0.05);
    }

    .sidebar .logo {
      font-size: 1.8rem;
      font-weight: 700;
      color: #4F46E5;
      margin-bottom: 30px;
      text-align: center;
    }

    .sidebar a {
      color: #555;
      text-decoration: none;
      margin: 8px 0;
      padding: 12px 18px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: background 0.3s, color 0.3s;
    }

    .sidebar a i {
      font-size: 1.1rem;
    }

    .sidebar a:hover,
    .sidebar a.active {
      background-color: #4F46E5;
      color: white;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20px 40px;
      overflow-y: auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 2rem;
      font-weight: 600;
    }

    .user-profile {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .user-profile img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
    }

    .user-profile span {
      font-weight: 500;
    }

    .logout-btn {
      background: #f44336;
      color: white;
      border: none;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .logout-btn:hover {
      background: #d32f2f;
    }

    .edit-form {
      background: white;
      padding: 30px;
      border-radius: 12px;
      max-width: 600px;
      margin: 0 auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .edit-form h2 {
      font-size: 1.6rem;
      margin-bottom: 20px;
      color: #333;
    }

    .edit-form form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .edit-form input,
    .edit-form select {
      padding: 12px;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      outline: none;
    }

    .edit-form button {
      padding: 12px;
      background-color: #4F46E5;
      color: white;
      font-size: 1rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 10px;
    }

    .edit-form button:hover {
      background-color: #3730a3;
    }
  </style>
</head>
<body>

<div class="container">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">EvalEra</div>
    <a href="teacher-dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
    <a href="teacher-submissions.html"><i class="fas fa-file-alt"></i> Submissions</a>
    <a href="teacher-evaluations.html"><i class="fas fa-check-circle"></i> Evaluations</a>
    <a href="teacher-profile.html" class="active"><i class="fas fa-user"></i> Profile</a>
    <a href="#"><i class="fas fa-cog"></i> Settings</a>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="header">
      <h1>Edit Profile</h1>
      <button onclick="alert('Logout not implemented')">Logout</button>
    </div>

    <div class="content">
      <div class="edit-form">
        <h2>Update Your Information</h2>
        <form onsubmit="event.preventDefault(); alert('Changes saved!'); window.location.href='teacher-profile.html';">
          <input type="text" placeholder="Full Name" value="Dr. Meera Kapoor" required />
          <input type="email" placeholder="Email" value="meera.kapoor@college.edu" required />
          <input type="text" placeholder="Department" value="Computer Science" />
          <input type="text" placeholder="Designation" value="Assistant Professor" />
          <input type="text" placeholder="Employee ID" value="FCS56789" readonly />
          <button type="submit">Save Changes</button>
        </form>
      </div>
    </div>
  </main>
</div>
<script src="../script.js"></script>

</body>
</html>
