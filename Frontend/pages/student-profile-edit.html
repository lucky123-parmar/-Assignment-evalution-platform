<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1440, initial-scale=1" />
  <title>Edit Profile – EvalEra</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="../style.css" />
  <style>
    body {
      background: #f0f2f5;
      font-family: 'Poppins', sans-serif;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 260px;
      background: #fff;
      color: #333;
      display: flex;
      flex-direction: column;
      padding: 20px;
      box-shadow: 2px 0 5px rgba(0,0,0,0.05);
    }

    .sidebar .logo {
      font-size: 1.8rem;
      font-weight: 700;
      color: #4F46E5;
      margin-bottom: 30px;
      text-align: center;
    }

    .sidebar a {
      color: #555;
      text-decoration: none;
      margin: 8px 0;
      padding: 12px 18px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: background 0.3s, color 0.3s;
    }

    .sidebar a i {
      font-size: 1.1rem;
    }

    .sidebar a:hover,
    .sidebar a.active {
      background-color: #4F46E5;
      color: white;
    }

    .main-content {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      background: #f9fafc;
    }

    .header {
      background: white;
      padding: 20px 30px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 600;
      font-size: 1.2rem;
      user-select: none;
    }

    .header .welcome {
      color: #4F46E5;
    }

    .dashboard-main {
      flex-grow: 1;
      padding: 30px 60px;
      overflow-y: auto;
      color: #374151;
    }

    h3 {
      margin-top: 0;
      margin-bottom: 30px;
      color: #374151;
      font-weight: 700;
      font-size: 2rem;
      user-select: none;
    }

    .form-card {
      background: white;
      border-radius: 10px;
      padding: 40px 60px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      max-width: 700px;
      margin: 0 auto;
    }

    label {
      display: block;
      margin-top: 20px;
      font-weight: 600;
      color: #4F46E5;
      font-size: 1rem;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 1rem;
      background: #f9fafb;
    }

    .save-btn {
      margin-top: 30px;
      padding: 12px 28px;
      background-color: #4F46E5;
      color: white;
      border: none;
      font-size: 1rem;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .save-btn:hover {
      background-color: #3730a3;
    }

    .back-link {
      display: inline-block;
      margin-top: 20px;
      text-decoration: none;
      color: #4F46E5;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Sidebar -->
    <aside class="sidebar">
    <div class="logo">EvalEra</div>
    <a href="student-dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
    <a href="student-submissions.html"><i class="fas fa-file-alt"></i> Submissions</a>
    <a href="student-profile.html" class="active"><i class="fas fa-user"></i> Profile</a>
    <a href="code-editor.html"><i class="fas fa-code"></i> Code Editor</a>
  </aside>

    <!-- Main content -->
    <main class="main-content">
      <header class="header">
        <div class="welcome">Edit Profile</div>
        <div>
          <button class="logout-btn" style="background:#4F46E5; color:#fff; border:none; padding:8px 16px; border-radius:5px; cursor:pointer;">Logout</button>
        </div>
      </header>

      <section class="dashboard-main">
        <h3>Edit Your Profile</h3>
        <form class="form-card">
          <label for="fullname">Full Name</label>
          <input type="text" id="fullname" value="Varsha Singh" />

          <label for="username">Username</label>
          <input type="text" id="username" value="varsha123" />

          <label for="email">Email</label>
          <input type="email" id="email" value="varsha@example.com" />

          <label for="roll">University Roll No.</label>
          <input type="text" id="roll" value="U20251234" />

          <button type="submit" class="save-btn">Save Changes</button>
          <a href="student-profile.html" class="back-link">← Back to Profile</a>
        </form>
      </section>
    </main>
  </div>
  <script src="../js/api.js"></script>
  <script src="../js/dashboard.js"></script>
  <script src="../js/student-dashboard.js"></script>
  <script src="../js/profile-edit.js"></script>
</body>
</html>
