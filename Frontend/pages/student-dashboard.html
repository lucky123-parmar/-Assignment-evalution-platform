<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1440, initial-scale=1" />
  <title>Student Dashboard – EvalEra</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="../style.css" />
  <style>
    body {
      background: #f0f2f5;
      font-family: 'Poppins', sans-serif;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 260px;
      background: #fff;
      color: #333;
      display: flex;
      flex-direction: column;
      padding: 20px;
      box-shadow: 2px 0 5px rgba(0,0,0,0.05);
    }

    .sidebar .logo {
      font-size: 1.8rem;
      font-weight: 700;
      color: #4F46E5;
      margin-bottom: 30px;
      text-align: center;
    }

    .sidebar a {
      color: #555;
      text-decoration: none;
      margin: 8px 0;
      padding: 12px 18px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: background 0.3s, color 0.3s;
    }

    .sidebar a i {
      font-size: 1.1rem;
    }

    .sidebar a:hover,
    .sidebar a.active {
      background-color: #4F46E5;
      color: white;
    }

    /* Main Content */
    .main-content {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      background: #f9fafc;
    }

    /* Header */
    .header {
      background: white;
      padding: 20px 30px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 600;
      font-size: 1.2rem;
      user-select: none;
    }

    .header .welcome {
      color: #4F46E5;
    }

    /* Dashboard area */
    .dashboard-main {
      flex-grow: 1;
      padding: 30px;
      overflow-y: auto;
    }

    .dashboard-main h3 {
      margin-top: 0;
      margin-bottom: 20px;
      color: #374151;
      font-weight: 700;
    }

    .dashboard-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 4px 12px rgb(0 0 0 / 0.05);
      user-select: none;
      transition: box-shadow 0.3s ease;
    }

    .card:hover {
      box-shadow: 0 6px 16px rgb(0 0 0 / 0.12);
    }

    .card h4 {
      margin-top: 0;
      margin-bottom: 12px;
      color: #4F46E5;
      font-weight: 700;
    }

    .card p {
      margin: 0;
      color: #6B7280;
      font-size: 0.9rem;
      line-height: 1.4;
    }

  </style>
</head>
<body>

  <div class="container">
    <!-- Sidebar -->
    <aside class="sidebar">
    <div class="logo">EvalEra</div>
    <a href="student-dashboard.html" class="active"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
    <a href="student-submissions.html"><i class="fas fa-file-alt"></i> Submissions</a>
    <a href="student-profile.html"><i class="fas fa-user"></i> Profile</a>
    <a href="code-editor.html"><i class="fas fa-code"></i> Code Editor</a>
  </aside>

    <!-- Main content -->
    <main class="main-content">
      <header class="header">
        <div class="welcome">Welcome, Varsha!</div>
        <div><button class="logout-btn" style="background:#4F46E5; color:#fff; border:none; padding:8px 16px; border-radius:5px; cursor:pointer;">Logout</button></div>
      </header>

      <section class="dashboard-main">
        <h3>Your Overview</h3>
        <div class="dashboard-cards">
          <div class="card">
            <h4>Assignments Pending</h4>
            <p>You have 3 assignments due in next 7 days.</p>
          </div>
          <div class="card">
            <h4>Submissions</h4>
            <p>12 submissions uploaded so far.</p>
          </div>
          <div class="card">
            <h4>Evaluation Scores</h4>
            <p>Your average score is 85%.</p>
          </div>
          <div class="card">
            <h4>Upcoming Deadlines</h4>
            <p>Next deadline: 25th July 2025.</p>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script src="../js/api.js"></script>
  <script src="../js/dashboard.js"></script>
  <script src="../js/student-dashboard.js"></script>
</body>
</html>
